server:
  port: 8089

spring:
  application:
    name: shipping-service

  datasource:
    url: jdbc:postgresql://localhost:5433/<DB_NAME>
    username: <DB_USERNAME>
    password: <DB_PASSWORD>
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

ithink:
  base-url: https://my.ithinklogistics.com
  access-token: <ITHINK_ACCESS_TOKEN>
  secret-key: <ITHINK_SECRET_KEY>
  pickup-address-id: <PICKUP_ADDRESS_ID>
  return-address-id: <RETURN_ADDRESS_ID>
  warehouse-pincode: "<WAREHOUSE_PINCODE>"
  # Set simulate: true to skip real iThink API calls (uses auto-generated AWB numbers)
  simulate: true
