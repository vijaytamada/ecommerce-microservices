server:
  port: 8087

spring:
  application:
    name: review-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/<DB_NAME>

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
