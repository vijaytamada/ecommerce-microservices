server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/<DB NAME>
    username: <ROLE NAME>
    password: <ROLE PASSWORD>
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

jwt:
  secret: THIS_IS_A_SUPER_LONG_SECRET_KEY_CHANGE_IT
  access-expiry-minutes: 15
  refresh-expiry-days: 30

app:
  reset-password:
    base-url: http://localhost:3000/reset-password
  mail:
    app-name: E-Commerce
